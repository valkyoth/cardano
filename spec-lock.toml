# Pinned upstream specification and fixture revisions.
#
# v0.1.0 establishes the source-check workflow only. Protocol milestones must
# pin exact upstream revisions before implementing consensus-sensitive Cardano
# behavior.

[cardano]
spec_required = false
ledger_repo = "https://github.com/IntersectMBO/cardano-ledger"
